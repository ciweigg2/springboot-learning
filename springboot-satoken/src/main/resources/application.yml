server:
  port: 8086

spring:
  application:
    name: springboot-satoken
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:satoken_demo;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: true
